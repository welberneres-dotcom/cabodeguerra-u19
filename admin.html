<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN - CABO DE GUERRA U19</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="admin">
        <body data-page="admin">
        <div id="loginGate" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; color: white; font-family: sans-serif;">
            <div style="background: white; padding: 30px; border-radius: 12px; display: flex; flex-direction: column; width: 300px; color: #333; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
                <h2 style="text-align: center; margin-bottom: 20px; color: #e53935;">Acesso Restrito</h2>
                <label>Usuário:</label>
                <input type="text" id="user" style="padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px;">
                <label>Senha:</label>
                <input type="password" id="pass" style="padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px;">
                <button onclick="verificarLogin()" style="background: #e53935; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold;">ENTRAR</button>
                <p id="erroLogin" style="color: red; font-size: 12px; margin-top: 10px; display: none; text-align: center;">Usuário ou senha incorretos!</p>
            </div>
        </div>
        <div class="container">
    
<div class="container">
    <div class="header-container">
        <img src="img/fira_logo.png" alt="Fira Brasil" class="header-logo">
        <h1>PAINEL DE CONTROLE - U19</h1>
        <img src="img/robotec_logo.png" alt="Robotec" class="header-logo">
    </div>

    <div class="grid-3">
        <div class="box" style="grid-column: span 2;">
            <h3>Lançar Ponto</h3>
            <select id="selectEquipe">
                <optgroup label="Grupo A">
                    <option>VIVERTEC</option>
                    <option>MASERATI</option>
                    <option>ROBO COC</option>
                    <option>MARVELTEC U-19</option>
                    <option>TECFLOR</option>
                </optgroup>
                <optgroup label="Grupo B">
                    <option>FLASHLIGHT</option>
                    <option>ROBOHERO</option>
                    <option>ROBOTEC-PED</option>
                    <option>ARTHEMIS</option>
                    <option>FÚRIA</option>
                    <option>ENGREBOT</option>
                </optgroup>
            </select>
            <select id="selectResultado">
                <option value="V">Vitória (+3)</option>
                <option value="E">Empate (+1)</option>
                <option value="D">Derrota (0)</option>
            </select>
            <button class="btn-add" id="btnRegistrar" onclick="registrar()">Registrar Resultado</button>
        </div>
        <div class="box">
            <h3>Histórico</h3>
            <div id="historico" class="history-list"></div>
        </div>
    </div>

    <div class="grid-3">
        <div style="grid-column: span 1.5;">
            <h3>Grupo A</h3>
            <table id="tabelaA">
                <thead><tr><th>Pos</th><th>Equipe</th><th>P</th><th>V</th><th>E</th><th>D</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div style="grid-column: span 1.5;">
            <h3>Grupo B</h3>
            <table id="tabelaB">
                <thead><tr><th>Pos</th><th>Equipe</th><th>P</th><th>V</th><th>E</th><th>D</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <button id="btnFinalizar" onclick="liberarMataMata()" class="btn-finalizar" style="background:#e53935; color:white; padding:15px; width:100%; font-weight:bold; border:none; border-radius:8px; cursor:pointer; margin: 20px 0;">
        FINALIZAR GRUPOS E GERAR MATA-MATA (4A x 4B)
    </button>

    <div class="fase-bracket">
        <h2>Mata-Mata (Clique no Vencedor)</h2>
        <div class="grid-3">
            <div>
                <div class="match-header">QUARTAS</div>
                <div class="match-container">
                    <button class="equipe-btn" id="q1_1" onclick="vencer('q1', this)">...</button>
                    <span class="vs-label">VS</span>
                    <button class="equipe-btn" id="q1_2" onclick="vencer('q1', this)">...</button>
                </div>
                <div class="match-container">
                    <button class="equipe-btn" id="q2_1" onclick="vencer('q2', this)">...</button>
                    <span class="vs-label">VS</span>
                    <button class="equipe-btn" id="q2_2" onclick="vencer('q2', this)">...</button>
                </div>
                <div class="match-container">
                    <button class="equipe-btn" id="q3_1" onclick="vencer('q3', this)">...</button>
                    <span class="vs-label">VS</span>
                    <button class="equipe-btn" id="q3_2" onclick="vencer('q3', this)">...</button>
                </div>
                <div class="match-container">
                    <button class="equipe-btn" id="q4_1" onclick="vencer('q4', this)">...</button>
                    <span class="vs-label">VS</span>
                    <button class="equipe-btn" id="q4_2" onclick="vencer('q4', this)">...</button>
                </div>
            </div>

            <div>
                <div class="match-header">SEMI</div>
                <div class="match-container" style="margin-top:40px;">
                    <button class="equipe-btn" id="s1_1" onclick="vencer('s1', this)">...</button>
                    <span class="vs-label">VS</span>
                    <button class="equipe-btn" id="s1_2" onclick="vencer('s1', this)">...</button>
                </div>
                <div class="match-container" style="margin-top:80px;">
                    <button class="equipe-btn" id="s2_1" onclick="vencer('s2', this)">...</button>
                    <span class="vs-label">VS</span>
                    <button class="equipe-btn" id="s2_2" onclick="vencer('s2', this)">...</button>
                </div>
            </div>

            <div>
                <div class="match-header" style="background:#ffd700; color:#000">FINAL</div>
                <div class="match-container" style="margin-top:100px;">
                    <button class="equipe-btn" id="f1" onclick="vencer('f', this)">...</button>
                    <span class="vs-label">VS</span>
                    <button class="equipe-btn" id="f2" onclick="vencer('f', this)">...</button>
                </div>
                <div id="podio" style="display:none; text-align:center;">
                    🏆 <h3 id="campeao_nome">---</h3>
                </div>
            </div>
        </div>
    </div>
    <button class="btn-reset" id="btnReset" onclick="confirmarReset()">ZERAR TUDO</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script src="js/script.js"></script>
</body>
</html>
