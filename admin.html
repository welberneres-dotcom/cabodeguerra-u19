<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN - CABO DE GUERRA U19</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="admin">
<div class="container">
    <div class="header-container">
        <img src="img/fira_logo.png" alt="Fira Brasil" class="header-logo">
        <h1>PAINEL DE CONTROLE - U19</h1>
        <img src="img/robotec_logo.png" alt="Robotec" class="header-logo">
    </div>

    <div class="grid-3">
        <div class="box" style="grid-column: span 2;">
            <h3>Lançar Ponto</h3>
            <select id="selectEquipe">
                <optgroup label="Grupo A">
                    <option>VIVERTEC</option>
                    <option>MASERATI</option>
                    <option>ROBO COC</option>
                    <option>MARVELTEC U-19</option>
                    <option>TECFLOR</option>
                </optgroup>
                <optgroup label="Grupo B">
                    <option>FLASHLIGHT</option>
                    <option>ROBOHERO</option>
                    <option>ROBOTEC-PED</option>
                    <option>ARTHEMIS</option>
                    <option>FÚRIA</option>
                    <option>ENGREBOT</option>
                </optgroup>
            </select>
            <select id="selectResultado">
                <option value="V">Vitória (+3)</option>
                <option value="E">Empate (+1)</option>
                <option value="D">Derrota (0)</option>
            </select>
            <button class="btn-add" id="btnRegistrar">Registrar Resultado</button>
        </div>
        <div class="box">
            <h3>Histórico</h3>
            <div id="historico" class="history-list"></div>
        </div>
    </div>

    <div class="grid-3">
        <!-- Apenas Grupos A e B para U19 -->
        <div style="grid-column: span 1.5;">
            <h3>Grupo A</h3>
            <table id="tabelaA">
                <thead><tr><th>Pos</th><th>Equipe</th><th>P</th><th>V</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div style="grid-column: span 1.5;">
            <h3>Grupo B</h3>
            <table id="tabelaB">
                <thead><tr><th>Pos</th><th>Equipe</th><th>P</th><th>V</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <button id="btnFinalizar" class="btn-finalizar" style="background:#e53935; color:white; padding:15px; width:100%; font-weight:bold; border:none; border-radius:8px; cursor:pointer; margin: 20px 0;">
        FINALIZAR GRUPOS E GERAR MATA-MATA (4A x 4B)
    </button>

    <div class="fase-bracket">
        <h2>Mata-Mata (Clique no Vencedor)</h2>
        <div class="grid-3">
            <div>
                <div class="match-header">QUARTAS</div>
                <div class="match-container">
                    <button class="equipe-btn" data-fase="q1" id="q1_equipe1">...</button>
                    <span class="vs-label">VS</span>
                    <button class="equipe-btn" data-fase="q1" id="q1_equipe2">...</button>
                </div>
                <div class="match-container">
                    <button class="equipe-btn" data-fase="q2" id="q2_equipe1">...</button>
                    <span class="vs-label">VS</span>
                    <button class="equipe-btn" data-fase="q2" id="q2_equipe2">...</button>
                </div>
                <div class="match-container">
                    <button class="equipe-btn" data-fase="q3" id="q3_equipe1">...</button>
                    <span class="vs-label">VS</span>
                    <button class="equipe-btn" data-fase="q3" id="q3_equipe2">...</button>
                </div>
                <div class="match-container">
                    <button class="equipe-btn" data-fase="q4" id="q4_equipe1">...</button>
                    <span class="vs-label">VS</span>
                    <button class="equipe-btn" data-fase="q4" id="q4_equipe2">...</button>
                </div>
            </div>

            <div>
                <div class="match-header">SEMI</div>
                <div class="match-container" style="margin-top:40px;">
                    <button class="equipe-btn" data-fase="s1" id="semi1_1">...</button>
                    <span class="vs-label">VS</span>
                    <button class="equipe-btn" data-fase="s1" id="semi1_2">...</button>
                </div>
                <div class="match-container" style="margin-top:80px;">
                    <button class="equipe-btn" data-fase="s2" id="semi2_1">...</button>
                    <span class="vs-label">VS</span>
                    <button class="equipe-btn" data-fase="s2" id="semi2_2">...</button>
                </div>
            </div>

            <div>
                <div class="match-header" style="background:#ffd700; color:#000">FINAL</div>
                <div class="match-container" style="margin-top:100px;">
                    <button class="equipe-btn" data-fase="f" id="final_1">...</button>
                    <span class="vs-label">VS</span>
                    <button class="equipe-btn" data-fase="f" id="final_2">...</button>
                </div>
                <div id="podio" style="display:none;">
                    🏆 <h3 id="campeao_nome">---</h3>
                </div>
            </div>
        </div>
    </div>
    <button class="btn-reset" id="btnReset">ZERAR TUDO</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script src="js/script.js"></script>
</body>
</html>
