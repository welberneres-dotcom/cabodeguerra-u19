<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLACAR - CABO DE GUERRA U19</title>
    <link rel="shortcut icon" href="img/fira_logo.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div class="header-container">
        <img src="img/fira_logo.png" alt="Fira Brasil" class="header-logo">
        <h1>COMPETIÇÃO DO CABO DE GUERRA - CATEGORIA U19</h1>
        <img src="img/robotec_logo.png" alt="Robotec" class="header-logo">
    </div>

    <div class="grid-top">
        <div>
            <h3>Grupo A</h3>
            <table id="tabelaA">
                <thead>
                    <tr>
                        <th class="col-pos">Pos</th>
                        <th class="col-equipe">Equipe</th>
                        <th class="col-stats">P</th>
                        <th class="col-stats">V</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div>
            <h3>Grupo B</h3>
            <table id="tabelaB">
                <thead>
                    <tr>
                        <th class="col-pos">Pos</th>
                        <th class="col-equipe">Equipe</th>
                        <th class="col-stats">P</th>
                        <th class="col-stats">V</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div class="fase-bracket">
        <h2>Fase Eliminatória</h2>
        <div class="grid-top" style="grid-template-columns: 1fr 1fr;">
            <div>
                <div class="match-header">QUARTAS DE FINAL</div>
                <div class="match-container">
                    <div class="equipe-view" id="q1_equipe1">...</div>
                    <span class="vs-label">VS</span>
                    <div class="equipe-view" id="q1_equipe2">...</div>
                </div>
                <div class="match-container">
                    <div class="equipe-view" id="q2_equipe1">...</div>
                    <span class="vs-label">VS</span>
                    <div class="equipe-view" id="q2_equipe2">...</div>
                </div>
                <div class="match-container">
                    <div class="equipe-view" id="q3_equipe1">...</div>
                    <span class="vs-label">VS</span>
                    <div class="equipe-view" id="q3_equipe2">...</div>
                </div>
                <div class="match-container">
                    <div class="equipe-view" id="q4_equipe1">...</div>
                    <span class="vs-label">VS</span>
                    <div class="equipe-view" id="q4_equipe2">...</div>
                </div>
            </div>

            <div>
                <div class="match-header">SEMI-FINAL</div>
                <div class="match-container">
                    <div class="equipe-view" id="semi1_1">...</div>
                    <span class="vs-label">VS</span>
                    <div class="equipe-view" id="semi1_2">...</div>
                </div>
                <div class="match-container">
                    <div class="equipe-view" id="semi2_1">...</div>
                    <span class="vs-label">VS</span>
                    <div class="equipe-view" id="semi2_2">...</div>
                </div>

                <div class="match-header" style="background:#ffd700; color:#000">GRANDE FINAL</div>
                <div class="match-container">
                    <div class="equipe-view" id="final_1">...</div>
                    <span class="vs-label">VS</span>
                    <div class="equipe-view" id="final_2">...</div>
                </div>

                <div id="podio">
                    <span style="font-size: 24px;">🏆</span>
                    <h3 style="margin: 5px 0; color: #b8860b; border: none;">CAMPEÃO U19</h3>
                    <div id="campeao_nome" style="font-weight: bold; font-size: 20px;">---</div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-logos">
        <span style="text-align: center; display: block; font-weight: bold; margin-bottom: 10px;">Realização e Apoio</span>
        <div class="logo-grid">
            <img src="img/robotec_logo.png" alt="Robotec">
            <img src="img/fira_logo.png" alt="Fira Brasil">
            <img src="img/coc_logo.png" alt="COC">
            <img src="img/robocity_logo.png" alt="Robo City">
        </div>
    </div>
</div>

<!-- O type="module" é obrigatório! -->
<script type="module" src="js/script.js"></script>
</body>
</html>
