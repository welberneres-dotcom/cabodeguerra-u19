<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN - CABO DE GUERRA U19</title>
    <link rel="shortcut icon" href="img/fira_logo.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div class="header-container">
        <img src="img/fira_logo.png" alt="Fira Brasil" class="header-logo">
        <h1>PAINEL DE CONTROLE - CATEGORIA U19</h1>
        <img src="img/robotec_logo.png" alt="Robotec" class="header-logo">
    </div>

    <div class="grid-top">
        <div class="box">
            <h3>Lançar Ponto (Fase de Grupos)</h3>
            <select id="selectEquipe">
                <optgroup label="Grupo A">
                    <option>VIVERTEC</option>
                    <option>MASERATI</option>
                    <option>ROBO COC</option>
                    <option>MARVELTEC U-19</option>
                    <option>TECFLOR</option>
                </optgroup>
                <optgroup label="Grupo B">
                    <option>FLASHLIGHT</option>
                    <option>ROBOHERO</option>
                    <option>ROBOTEC-PED</option>
                    <option>ARTHEMIS</option>
                    <option>FÚRIA</option>
                    <option>ENGREBOT</option>
                </optgroup>
            </select>
            <select id="selectResultado">
                <option value="V">Vitória (+3)</option>
                <option value="E">Empate (+1)</option>
                <option value="D">Derrota (0)</option>
            </select>
            <button class="btn-add" id="btnRegistrar">Registrar Resultado</button>
        </div>
        <div class="box">
            <h3>Histórico / Correção</h3>
            <div id="historico" class="history-list"></div>
        </div>
    </div>

    <div class="grid-top">
        <div>
            <h3>Grupo A</h3>
            <table id="tabelaA">
                <thead>
                    <tr>
                        <th class="col-pos">Pos</th>
                        <th class="col-equipe">Equipe</th>
                        <th class="col-stats">P</th>
                        <th class="col-stats">V</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div>
            <h3>Grupo B</h3>
            <table id="tabelaB">
                <thead>
                    <tr>
                        <th class="col-pos">Pos</th>
                        <th class="col-equipe">Equipe</th>
                        <th class="col-stats">P</th>
                        <th class="col-stats">V</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <button id="btnFinalizar" class="btn-finalizar">
        FINALIZAR FASE DE GRUPOS E GERAR CHAVES
    </button>

    <div class="fase-bracket">
        <h2>Fase Eliminatória (Clique no Vencedor)</h2>
        <div class="grid-top" style="grid-template-columns: 1fr 1fr;">
            <div>
                <div class="match-header">QUARTAS DE FINAL</div>
                <div class="match-container" id="m_q1">
                    <button class="equipe-btn" data-fase="q1" id="q1_equipe1">...</button>
                    <span class="vs-label">VS</span>
                    <button class="equipe-btn" data-fase="q1" id="q1_equipe2">...</button>
                </div>
                <div class="match-container" id="m_q2">
                    <button class="equipe-btn" data-fase="q2" id="q2_equipe1">...</button>
                    <span class="vs-label">VS</span>
                    <button class="equipe-btn" data-fase="q2" id="q2_equipe2">...</button>
                </div>
                <div class="match-container" id="m_q3">
                    <button class="equipe-btn" data-fase="q3" id="q3_equipe1">...</button>
                    <span class="vs-label">VS</span>
                    <button class="equipe-btn" data-fase="q3" id="q3_equipe2">...</button>
                </div>
                <div class="match-container" id="m_q4">
                    <button class="equipe-btn" data-fase="q4" id="q4_equipe1">...</button>
                    <span class="vs-label">VS</span>
                    <button class="equipe-btn" data-fase="q4" id="q4_equipe2">...</button>
                </div>
            </div>

            <div>
                <div class="match-header">SEMI-FINAL</div>
                <div class="match-container" id="m_s1">
                    <button class="equipe-btn" data-fase="s1" id="semi1_1">Venc. J1</button>
                    <span class="vs-label">VS</span>
                    <button class="equipe-btn" data-fase="s1" id="semi1_2">Venc. J4</button>
                </div>
                <div class="match-container" id="m_s2">
                    <button class="equipe-btn" data-fase="s2" id="semi2_1">Venc. J2</button>
                    <span class="vs-label">VS</span>
                    <button class="equipe-btn" data-fase="s2" id="semi2_2">Venc. J3</button>
                </div>

                <div class="match-header" style="background:#ffd700; color:#000">GRANDE FINAL</div>
                <div class="match-container" id="m_f">
                    <button class="equipe-btn" data-fase="f" id="final_1">Finalista 1</button>
                    <span class="vs-label">VS</span>
                    <button class="equipe-btn" data-fase="f" id="final_2">Finalista 2</button>
                </div>

                <div id="podio">
                    <span style="font-size: 24px;">🏆</span>
                    <h3 style="margin: 5px 0; color: #b8860b; border: none;">CAMPEÃO U19</h3>
                    <div id="campeao_nome" style="font-weight: bold; font-size: 20px;">---</div>
                </div>
            </div>
        </div>
    </div>

    <button id="btnReset" class="btn-reset">ZERAR TODO O PLACAR</button>
</div>

<script type="module" src="js/script.js"></script>
</body>
</html>
